<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>TaskFlow</title>
    <script>
      var l = window.location;
      l.replace(l.protocol + '//' + l.host + l.pathname.split('/')[0] +
        '/?p=/' + l.pathname.slice(1) + (l.search ? '&q=' + l.search.slice(1) : '') + l.hash);
    </script>
  </head>
</html>
